function canvasTouchPos(touch){
  const r=c.getBoundingClientRect();
  return{x:(touch.clientX-r.left)*(W/r.width),y:(touch.clientY-r.top)*(H/r.height)};
}

function hitBtn(tx,ty,b){return tx>=b.x-b.w/2&&tx<=b.x+b.w/2&&ty>=b.y-b.h/2&&ty<=b.y+b.h/2}

function processTouches(touches){
  touchDirX=0;
  const prev={...touchBtns};
  touchBtns={};
  for(let i=0;i<touches.length;i++){
    const p=canvasTouchPos(touches[i]);
    if(hitBtn(p.x,p.y,VB.left))touchDirX=-1;
    if(hitBtn(p.x,p.y,VB.right))touchDirX=1;
    for(const k of ['head','waist','wrist','block','special']){
      if(hitBtn(p.x,p.y,VB[k]))touchBtns[k]=true;
    }
  }
  if(touchBtns.head&&!prev.head){jp['KeyA']=true}
  if(touchBtns.waist&&!prev.waist){jp['KeyS']=true}
  if(touchBtns.wrist&&!prev.wrist){jp['KeyD']=true}
  if(touchBtns.special&&!prev.special){jp['Space']=true}
  keys['ArrowLeft']=touchDirX===-1;
  keys['ArrowRight']=touchDirX===1;
  keys['ShiftLeft']=!!touchBtns.block;
  keys['ShiftRight']=!!touchBtns.block;
}

c.addEventListener('touchstart',e=>{
  e.preventDefault();
  ia();
  if(gs==='FIGHT'){
    processTouches(e.touches);
  }else{
    const p=canvasTouchPos(e.touches[0]);
    mouseX=p.x;mouseY=p.y;
    mouseClick=true;touchTap=true;
    jp['Enter']=true;
  }
},{passive:false});

c.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(gs==='FIGHT')processTouches(e.touches);
  else{const p=canvasTouchPos(e.touches[0]);mouseX=p.x;mouseY=p.y}
},{passive:false});

c.addEventListener('touchend',e=>{
  e.preventDefault();
  if(gs==='FIGHT'){
    processTouches(e.touches);
    if(e.touches.length===0){touchDirX=0;keys['ArrowLeft']=false;keys['ArrowRight']=false;keys['ShiftLeft']=false;keys['ShiftRight']=false;touchBtns={}}

function snd(freq,dur,type,vol){
  ia();const o=ac.createOscillator(),g=ac.createGain();
  o.type=type||'square';o.frequency.value=freq;
  g.gain.setValueAtTime(vol||0.08,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||0.15));
  o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+(dur||0.15));
}
function sndHit(){
  ia();const n=ac.sampleRate*0.08,b=ac.createBuffer(1,n,ac.sampleRate),d=b.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(n*0.15));
  const s=ac.createBufferSource();s.buffer=b;const g=ac.createGain();g.gain.value=0.2;
  const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=1800;
  s.connect(f);f.connect(g);g.connect(ac.destination);s.start();
}

// ============ PARTICLES ============
let particles=[];
function addParticle(x,y,vx,vy,life,col,sz,type){
  particles.push({x,y,vx,vy,life,maxLife:life,col,sz:sz||3,type:type||'circle'});
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    const a=p.life/p.maxLife;
    X.globalAlpha=a;
    if(p.type==='star'){
      drawStar(p.x,p.y,p.sz,p.col);
    }else if(p.type==='heart'){
      drawHeart(p.x,p.y,p.sz,p.col);
    }else if(p.type==='spark'){
      X.fillStyle=p.col;
      X.fillRect(p.x,p.y,p.sz*(1+a),p.sz*0.5);
    }else{
      circle(p.x,p.y,p.sz*a,p.col);
    }
  }
  X.globalAlpha=1;
}
function drawStar(x,y,r,col){
  X.fillStyle=col;X.beginPath();
  for(let i=0;i<5;i++){
    const a1=Math.PI*2/5*i-Math.PI/2;
    const a2=a1+Math.PI/5;
    X.lineTo(x+Math.cos(a1)*r,y+Math.sin(a1)*r);
    X.lineTo(x+Math.cos(a2)*r*0.4,y+Math.sin(a2)*r*0.4);
  }
  X.closePath();X.fill();
}
function drawHeart(x,y,s,col){
  X.fillStyle=col;X.beginPath();
  X.moveTo(x,y+s*0.3);
  X.bezierCurveTo(x-s,y-s*0.5,x-s*0.5,y-s,x,y-s*0.4);
  X.bezierCurveTo(x+s*0.5,y-s,x+s,y-s*0.5,x,y+s*0.3);
  X.fill();
}

function getTopChar(){let top='yuna',max=-999;for(const k in affection)if(affection[k]>max){max=affection[k];top=k}return top}
function addAff(c,a){affection[c]=(affection[c]||0)+a;if(a>0)affPopups.push({char:c,amount:a,timer:80,y:0})}

// ============ DIALOG SYSTEM ============
function dialog(lines){dialogQueue=lines;dialogIdx=0;textReveal=0;choiceOptions=null}
function showChoice(options){choiceOptions=options;choiceHover=-1}

// ============ DRAW HELPERS ============
function circle(x,y,r,col){X.fillStyle=col;X.beginPath();X.arc(x,y,r,0,Math.PI*2);X.fill()}
function ellipse(x,y,rx,ry,col){X.fillStyle=col;X.beginPath();X.ellipse(x,y,rx,ry,0,0,Math.PI*2);X.fill()}
function roundRect(x,y,w,h,r,col){
  X.fillStyle=col;X.beginPath();
  X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  X.lineTo(x+r,y+h);X.quadraticCurveTo(x,y+h,x,y+h-r);
  X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);X.fill();
}
function limb(x1,y1,x2,y2,w,col){
  X.strokeStyle=col;X.lineCap='round';X.lineWidth=w;
  X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
}

function drawCuteChar(ch, expr, t){
  const bob=Math.sin(t*0.04)*2;
  const cy=-75+bob;

  // === BACK HAIR ===
  if(ch.hairStyle==='long_straight'){
    X.fillStyle=ch.hairCol;
    X.beginPath();X.moveTo(-20,cy-10);X.quadraticCurveTo(-26,cy+30,-22,cy+70);
    X.lineTo(-16,cy+70);X.quadraticCurveTo(-18,cy+30,-14,cy-5);X.fill();
    X.beginPath();X.moveTo(14,cy-5);X.quadraticCurveTo(18,cy+30,16,cy+70);
    X.lineTo(22,cy+70);X.quadraticCurveTo(26,cy+30,20,cy-10);X.fill();
  }else if(ch.hairStyle==='twin_tail'){
    X.fillStyle=ch.hairCol;
    X.beginPath();X.moveTo(-20,cy-5);X.quadraticCurveTo(-32,cy+20,-28,cy+55);
    X.quadraticCurveTo(-24,cy+60,-20,cy+50);X.quadraticCurveTo(-22,cy+20,-16,cy);X.fill();
    X.beginPath();X.moveTo(16,cy);X.quadraticCurveTo(22,cy+20,20,cy+50);
    X.quadraticCurveTo(24,cy+60,28,cy+55);X.quadraticCurveTo(32,cy+20,20,cy-5);X.fill();
    X.fillStyle=ch.hairLight;
    X.globalAlpha=0.3;
    X.beginPath();X.moveTo(-22,cy+10);X.quadraticCurveTo(-28,cy+25,-26,cy+40);X.lineTo(-24,cy+38);X.quadraticCurveTo(-26,cy+25,-20,cy+12);X.fill();
    X.globalAlpha=1;
  }else if(ch.hairStyle==='ponytail'){
    // Ponytail back hair - hanging down from back of head
    X.fillStyle=ch.hairCol;
    X.beginPath();
    X.moveTo(2,cy-10);
    X.bezierCurveTo(10,cy+5,14,cy+30,10,cy+65);
    X.lineTo(4,cy+68);
    X.bezierCurveTo(6,cy+35,4,cy+10,-2,cy-5);
    X.fill();
    // Hair tie at base of ponytail
    X.fillStyle=ch.accentCol;
    circle(4,cy-2,4,ch.accentCol);
    circle(4,cy-2,2,'rgba(255,255,255,0.3)');
    // Ponytail shine
    X.fillStyle=ch.hairLight;
    X.globalAlpha=0.3;
    X.beginPath();X.moveTo(5,cy+10);X.quadraticCurveTo(10,cy+25,8,cy+45);
    X.lineTo(6,cy+43);X.quadraticCurveTo(8,cy+25,3,cy+12);X.fill();
    X.globalAlpha=1;
  }
  // short_neat: no back hair needed

  // === LEGS ===
  const legBob=Math.sin(t*0.06)*1.5;
  roundRect(-12,cy+42,11,28,5,ch.bodyCol);
  roundRect(-13,cy+66,13,7,4,'#333');
  X.fillStyle='#555';X.fillRect(-12,cy+67,11,2);
  roundRect(1,cy+42+legBob*0.5,11,28,5,ch.bodyCol);
  roundRect(0,cy+66+legBob*0.5,13,7,4,'#333');
  X.fillStyle='#555';X.fillRect(1,cy+67+legBob*0.5,11,2);

  // === BODY (dobok) ===
  const bodyGrd=X.createLinearGradient(-18,cy+5,18,cy+5);
  bodyGrd.addColorStop(0,ch.bodyCol);bodyGrd.addColorStop(0.5,ch.bodyColL);bodyGrd.addColorStop(1,ch.bodyCol);
  roundRect(-18,cy+3,36,42,10,bodyGrd);

  X.fillStyle=ch.skinCol;
  X.beginPath();X.moveTo(-6,cy+5);X.lineTo(0,cy+20);X.lineTo(6,cy+5);X.fill();
  X.strokeStyle='rgba(255,255,255,0.15)';X.lineWidth=1;
  X.beginPath();X.moveTo(-4,cy+6);X.lineTo(0,cy+18);X.lineTo(4,cy+6);X.stroke();

  const beltGrd=X.createLinearGradient(0,cy+30,0,cy+37);
  beltGrd.addColorStop(0,'#222');beltGrd.addColorStop(0.5,'#444');beltGrd.addColorStop(1,'#222');
  roundRect(-17,cy+30,34,7,3,beltGrd);
  circle(0,cy+33,4,ch.accentCol);
  circle(0,cy+33,2,'rgba(255,255,255,0.2)');

  // === ARMS ===
  const armSwing=Math.sin(t*0.05)*0.1;
  X.save();X.translate(-18,cy+10);X.rotate(-0.3+armSwing);
  roundRect(-3,-2,10,26,5,ch.bodyCol);
  circle(2,26,5,ch.skinCol);
  circle(2,26,3,ch.skinLight);
  X.restore();
  X.save();X.translate(18,cy+10);X.rotate(0.5-armSwing);
  roundRect(-7,-2,10,26,5,ch.bodyCol);
  circle(-2,26,5,ch.skinCol);
  circle(-2,26,3,ch.skinLight);
  limb(-2,26,-2+Math.sin(0.5)*55,26-Math.cos(0.5)*55,3,'#deb887');
  circle(-2+Math.sin(0.5)*55,26-Math.cos(0.5)*55,3,'#c4a06a');
  limb(-2,26,-2+Math.sin(0.5)*12,26-Math.cos(0.5)*12,5,'#7a5a30');
  circle(-2+Math.sin(0.5)*13,26-Math.cos(0.5)*13,4,'#5a4a30');
  X.restore();

  // === HEAD ===
  const headR=26;
  const headY=cy-18;

  circle(0,headY-1,headR+6,ch.hairCol);
  circle(0,headY,headR,ch.skinCol);
  const skinGrd=X.createRadialGradient(-5,headY-5,2,-3,headY-3,headR);
  skinGrd.addColorStop(0,ch.skinLight);skinGrd.addColorStop(0.6,ch.skinCol);skinGrd.addColorStop(1,ch.skinCol);
  circle(0,headY,headR-1,skinGrd);

  // Ears
  ellipse(-headR+1,headY+3,6,7,ch.skinCol);
  ellipse(-headR+2,headY+3,4,5,ch.skinLight);
  if(ch.personality==='cool'){circle(-headR-1,headY+8,2,ch.accentCol);circle(-headR-1,headY+8,1,'rgba(255,255,255,0.4)')}
  ellipse(headR-1,headY+3,6,7,ch.skinCol);
  ellipse(headR-2,headY+3,4,5,ch.skinLight);
  if(ch.personality==='cool'){circle(headR+1,headY+8,2,ch.accentCol)}

  // === FRONT HAIR ===
  if(ch.hairStyle==='long_straight'){
    X.fillStyle=ch.hairCol;
    X.beginPath();
    X.moveTo(-headR-2,headY-2);X.quadraticCurveTo(-headR+5,headY-headR-8,0,headY-headR-4);
    X.quadraticCurveTo(headR-5,headY-headR-6,headR+2,headY-2);
    X.quadraticCurveTo(headR-2,headY-headR+4,0,headY-headR+2);
    X.quadraticCurveTo(-headR+2,headY-headR+4,-headR-2,headY-2);
    X.fill();
    X.beginPath();X.moveTo(-12,headY-headR+4);X.quadraticCurveTo(-14,headY-8,-10,headY-2);
    X.lineTo(-7,headY-3);X.quadraticCurveTo(-10,headY-10,-8,headY-headR+5);X.fill();
    X.beginPath();X.moveTo(-4,headY-headR+3);X.quadraticCurveTo(-2,headY-8,0,headY-1);
    X.lineTo(3,headY-2);X.quadraticCurveTo(2,headY-10,0,headY-headR+3);X.fill();
    X.fillStyle=ch.hairLight;X.globalAlpha=0.25;
    X.beginPath();X.moveTo(-5,headY-headR+3);X.quadraticCurveTo(-3,headY-12,2,headY-headR+4);
    X.lineTo(0,headY-headR+6);X.quadraticCurveTo(-2,headY-10,-4,headY-headR+5);X.fill();
    X.globalAlpha=1;
    X.fillStyle=ch.hairCol;
    roundRect(-headR-3,headY-8,8,35,4,ch.hairCol);
    roundRect(headR-5,headY-8,8,35,4,ch.hairCol);
  }else if(ch.hairStyle==='spiky'){
    X.fillStyle=ch.hairCol;
    X.beginPath();
    X.moveTo(-headR,headY-2);X.quadraticCurveTo(-headR+5,headY-headR-5,0,headY-headR-3);
    X.quadraticCurveTo(headR-5,headY-headR-5,headR,headY-2);
    X.quadraticCurveTo(headR-3,headY-headR+5,0,headY-headR+3);
    X.quadraticCurveTo(-headR+3,headY-headR+5,-headR,headY-2);
    X.fill();
    const spikes=[[-15,-8,-12,-18,-8,-6],[- 4,-6,-2,-16,2,-5],[6,-7,10,-18,14,-6],[16,-5,20,-14,22,-3],[-8,-7,-6,-14,-3,-6]];
    for(const s of spikes){
      X.beginPath();X.moveTo(s[0],headY+s[1]);X.lineTo(s[2],headY+s[3]);X.lineTo(s[4],headY+s[5]);X.fill();
    }
    X.fillStyle=ch.hairLight;X.globalAlpha=0.3;
    X.beginPath();X.moveTo(-5,headY-headR+4);X.quadraticCurveTo(0,headY-headR-2,5,headY-headR+4);
    X.lineTo(3,headY-headR+6);X.quadraticCurveTo(0,headY-headR,- 3,headY-headR+6);X.fill();
    X.globalAlpha=1;
  }else if(ch.hairStyle==='twin_tail'){
    X.fillStyle=ch.hairCol;
    X.beginPath();
    X.moveTo(-headR-1,headY-1);X.quadraticCurveTo(-headR+3,headY-headR-4,0,headY-headR-2);
    X.quadraticCurveTo(headR-3,headY-headR-4,headR+1,headY-1);
    X.quadraticCurveTo(headR-2,headY-headR+5,0,headY-headR+3);
    X.quadraticCurveTo(-headR+2,headY-headR+5,-headR-1,headY-1);
    X.fill();
    for(let i=-12;i<14;i+=5){
      X.beginPath();X.moveTo(i,headY-headR+4);X.lineTo(i+2,headY-6);X.lineTo(i+4,headY-headR+4);X.fill();
    }
    // Ribbons
    X.fillStyle=ch.accentCol;
    X.beginPath();X.moveTo(-20,headY-10);X.quadraticCurveTo(-30,headY-18,-22,headY-22);X.quadraticCurveTo(-18,headY-16,-20,headY-10);X.fill();
    X.beginPath();X.moveTo(-20,headY-10);X.quadraticCurveTo(-28,headY-4,-22,headY+2);X.quadraticCurveTo(-18,headY-4,-20,headY-10);X.fill();
    circle(-20,headY-10,3,'#fff');
    X.fillStyle=ch.accentCol;
    X.beginPath();X.moveTo(20,headY-10);X.quadraticCurveTo(30,headY-18,22,headY-22);X.quadraticCurveTo(18,headY-16,20,headY-10);X.fill();
    X.beginPath();X.moveTo(20,headY-10);X.quadraticCurveTo(28,headY-4,22,headY+2);X.quadraticCurveTo(18,headY-4,20,headY-10);X.fill();
    circle(20,headY-10,3,'#fff');
    X.fillStyle=ch.hairLight;X.globalAlpha=0.25;
    X.beginPath();X.moveTo(-4,headY-headR+4);X.quadraticCurveTo(0,headY-headR,4,headY-headR+4);
    X.lineTo(2,headY-headR+6);X.quadraticCurveTo(0,headY-headR+2,-2,headY-headR+6);X.fill();
    X.globalAlpha=1;
  }else if(ch.hairStyle==='ponytail'){
    // Ponytail front: swept side bangs
    X.fillStyle=ch.hairCol;
    X.beginPath();
    X.moveTo(-headR-1,headY-1);
    X.quadraticCurveTo(-headR+5,headY-headR-6,0,headY-headR-3);

    X.lineTo(-9,headY-2);X.quadraticCurveTo(-12,headY-10,-10,headY-headR+5);X.fill();

    X.fillStyle=ch.hairLight;X.globalAlpha=0.25;
    X.beginPath();X.moveTo(-4,headY-headR+3);X.quadraticCurveTo(0,headY-headR-1,4,headY-headR+3);
    X.lineTo(2,headY-headR+5);X.quadraticCurveTo(0,headY-headR+1,-2,headY-headR+5);X.fill();
    X.globalAlpha=1;
    // Hair tie on top (circle)
    X.fillStyle=ch.accentCol;

    X.beginPath();
    X.moveTo(-headR,headY-2);
    X.quadraticCurveTo(-headR+4,headY-headR-4,-3,headY-headR-2);
    X.quadraticCurveTo(headR-6,headY-headR-5,headR,headY-2);
    X.quadraticCurveTo(headR-3,headY-headR+5,0,headY-headR+3);
    X.quadraticCurveTo(-headR+3,headY-headR+4,-headR,headY-2);
    X.fill();
    // Part line (side part)
    X.strokeStyle=ch.hairLight;X.lineWidth=1;X.globalAlpha=0.4;
    X.beginPath();X.moveTo(-5,headY-headR+2);X.quadraticCurveTo(-6,headY-headR-1,-3,headY-headR-2);X.stroke();
    X.globalAlpha=1;
    // Short side bangs
    X.fillStyle=ch.hairCol;
    X.beginPath();X.moveTo(-12,headY-headR+4);X.quadraticCurveTo(-13,headY-8,-10,headY-4);
    X.lineTo(-8,headY-5);X.quadraticCurveTo(-10,headY-10,-9,headY-headR+5);X.fill();
    X.beginPath();X.moveTo(-3,headY-headR+3);X.quadraticCurveTo(-1,headY-9,1,headY-4);
    X.lineTo(3,headY-5);X.quadraticCurveTo(1,headY-10,0,headY-headR+4);X.fill();
    // Hair shine
    X.fillStyle=ch.hairLight;X.globalAlpha=0.3;
    X.beginPath();X.moveTo(-3,headY-headR+3);X.quadraticCurveTo(0,headY-headR-1,3,headY-headR+3);
    X.lineTo(1,headY-headR+5);X.quadraticCurveTo(0,headY-headR+1,-1,headY-headR+5);X.fill();
    X.globalAlpha=1;
  }

  // === EYES ===
  const eyeY=headY+1;
  const eyeSpan=9;

  if(expr==='happy'||expr==='excited'){
    X.strokeStyle='#2a2a4a';X.lineWidth=2.5;X.lineCap='round';
    X.beginPath();X.arc(-eyeSpan,eyeY,6,Math.PI+0.2,Math.PI*2-0.2);X.stroke();
    X.beginPath();X.arc(eyeSpan,eyeY,6,Math.PI+0.2,Math.PI*2-0.2);X.stroke();
    X.beginPath();X.moveTo(-eyeSpan-6,eyeY-2);X.lineTo(-eyeSpan-4,eyeY-4);X.stroke();
    X.beginPath();X.moveTo(eyeSpan+4,eyeY-4);X.lineTo(eyeSpan+6,eyeY-2);X.stroke();
  }else if(expr==='shy'){
    drawBigEye(-eyeSpan,eyeY,ch.eyeCol,0.8,-1);
    drawBigEye(eyeSpan,eyeY,ch.eyeCol,0.8,1);
    X.globalAlpha=0.5;
    ellipse(-16,eyeY+8,6,4,'#ff8888');ellipse(16,eyeY+8,6,4,'#ff8888');
    X.globalAlpha=1;
  }else if(expr==='surprise'){
    drawBigEye(-eyeSpan,eyeY,ch.eyeCol,1.15,0);
    drawBigEye(eyeSpan,eyeY,ch.eyeCol,1.15,0);
  }else if(expr==='determined'){
    drawBigEye(-eyeSpan,eyeY,ch.eyeCol,0.95,0);
    drawBigEye(eyeSpan,eyeY,ch.eyeCol,0.95,0);
    X.strokeStyle='#2a2a2a';X.lineWidth=3;X.lineCap='round';
    X.beginPath();X.moveTo(-eyeSpan-7,eyeY-10);X.lineTo(-eyeSpan+3,eyeY-12);X.stroke();
    X.beginPath();X.moveTo(eyeSpan-3,eyeY-12);X.lineTo(eyeSpan+7,eyeY-10);X.stroke();
  }else if(expr==='soft'){
    drawBigEye(-eyeSpan,eyeY,ch.eyeCol,0.9,-0.5);
    drawBigEye(eyeSpan,eyeY,ch.eyeCol,0.9,0.5);
    X.globalAlpha=0.3;
    ellipse(-15,eyeY+7,5,3,'#ff8888');ellipse(15,eyeY+7,5,3,'#ff8888');
    X.globalAlpha=1;
  }else{
    drawBigEye(-eyeSpan,eyeY,ch.eyeCol,1,0);
    drawBigEye(eyeSpan,eyeY,ch.eyeCol,1,0);
  }

  // Eyebrows
  if(expr!=='determined'&&expr!=='happy'&&expr!=='excited'){
    X.strokeStyle=ch.hairCol;X.lineWidth=2;X.lineCap='round';
    X.beginPath();X.moveTo(-eyeSpan-5,eyeY-10);X.lineTo(-eyeSpan+3,eyeY-11);X.stroke();
    X.beginPath();X.moveTo(eyeSpan-3,eyeY-11);X.lineTo(eyeSpan+5,eyeY-10);X.stroke();
  }

  // Nose
  circle(0,headY+7,2,(ch.personality==='shy'||ch.personality==='tsundere')?'#ecc8a0':'#e8b080');

  // Mouth
  if(expr==='happy'||expr==='excited'){
    X.fillStyle='#3a1a1a';
    X.beginPath();X.arc(0,headY+12,6,0.1,Math.PI-0.1);X.fill();
    X.fillStyle='#ff6666';
    X.beginPath();X.arc(0,headY+13,4,0.2,Math.PI-0.2);X.fill();
  }else if(expr==='surprise'){
    ellipse(0,headY+13,4,5,'#3a1a1a');
  }else if(expr==='shy'){
    X.strokeStyle='#c08848';X.lineWidth=1.5;X.lineCap='round';
    X.beginPath();X.arc(0,headY+10,4,0.3,Math.PI-0.3);X.stroke();
  }else if(expr==='determined'){
    X.strokeStyle='#8a6040';X.lineWidth=2;X.lineCap='round';
    X.beginPath();X.moveTo(-4,headY+12);X.lineTo(4,headY+12);X.stroke();
  }else if(expr==='soft'){
    X.strokeStyle='#c08848';X.lineWidth=1.8;X.lineCap='round';
    X.beginPath();X.arc(0,headY+10,5,0.15,Math.PI-0.15);X.stroke();
  }else{
    X.strokeStyle='#c08848';X.lineWidth=1.5;
    X.beginPath();X.moveTo(-3,headY+12);X.lineTo(3,headY+12);X.stroke();
  }

  // === HEADBAND ===
  X.save();
  X.beginPath();X.arc(0,headY,headR+1,-2.6,-0.5);
  X.strokeStyle=ch.headbandCol;X.lineWidth=5;X.stroke();
  X.beginPath();X.arc(0,headY,headR+1,-2.2,-0.8);
  X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=2;X.stroke();
  const flutter=Math.sin(t*0.08)*3;
  X.fillStyle=ch.headbandCol;
  X.beginPath();X.moveTo(headR-2,headY-7);
  X.quadraticCurveTo(headR+8,headY-14+flutter,headR+18,headY-10+flutter);
  X.quadraticCurveTo(headR+10,headY-8+flutter*0.5,headR+16,headY-4+flutter*0.7);
  X.quadraticCurveTo(headR+6,headY-2,headR-2,headY-3);X.fill();
  X.fillStyle='rgba(255,255,255,0.15)';
  X.beginPath();X.moveTo(headR,headY-6);
  X.quadraticCurveTo(headR+6,headY-12+flutter,headR+14,headY-9+flutter);
  X.lineTo(headR+12,headY-7+flutter*0.5);X.quadraticCurveTo(headR+4,headY-10+flutter,headR,headY-5);X.fill();
  X.restore();
}

// Big sparkly eye
function drawBigEye(x,y,irisCol,sizeMul,lookDir){
  const s=sizeMul||1;
  const lx=(lookDir||0)*1.5;
  ellipse(x,y,8*s,9*s,'#fff');
  X.globalAlpha=0.1;ellipse(x,y-2*s,7*s,4*s,'#88aacc');X.globalAlpha=1;
  const irisR=5.5*s;
  const igrd=X.createRadialGradient(x+lx,y+1,1,x+lx,y+1,irisR);
  igrd.addColorStop(0,irisCol);igrd.addColorStop(0.6,irisCol);igrd.addColorStop(1,'#1a1a3a');
  circle(x+lx,y+1,irisR,igrd);
  circle(x+lx,y+1,3*s,'#111');
  circle(x+lx-2*s,y-2*s,2.5*s,'#fff');
  circle(x+lx+2*s,y+2.5*s,1.5*s,'rgba(255,255,255,0.7)');
  X.fillStyle='rgba(255,255,255,0.5)';
  drawStar(x+lx+1,y-1*s,1.2*s,'rgba(255,255,255,0.4)');
  X.strokeStyle='#1a1a3a';X.lineWidth=2*s;X.lineCap='round';
  X.beginPath();X.arc(x,y,8*s,Math.PI+0.3,Math.PI*2-0.3);X.stroke();
}

// ============ DIALOG BOX ============
function drawDialogBox(){
  if(dialogQueue.length===0&&!choiceOptions)return;
  if(dialogQueue.length>0 && dialogIdx<dialogQueue.length){
    const d=dialogQueue[dialogIdx];
    const boxY=H-140,boxH=130;
    X.fillStyle='rgba(0,0,0,0.85)';roundRect(30,boxY,W-60,boxH,12,'rgba(0,0,0,0.85)');
    X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=2;X.beginPath();X.roundRect(30,boxY,W-60,boxH,12);X.stroke();
    if(d.name){
      const nw=Math.max(80,d.name.length*16+20);
      roundRect(50,boxY-20,nw,28,8,'rgba(0,0,0,0.9)');
      X.strokeStyle='rgba(255,255,255,0.3)';X.lineWidth=1;X.beginPath();X.roundRect(50,boxY-20,nw,28,8);X.stroke();
      X.font=`bold 15px ${FONT}`;X.textAlign='left';
      let nameCol='#fff';
      if(d.name==='유정'||d.name==='유정 선배')nameCol='#aa88ff';
      else if(d.name==='지훈')nameCol='#ffaa44';
      else if(d.name==='소정')nameCol='#ff88aa';
      else if(d.name==='채영')nameCol='#44cc88';
      else if(d.name==='성수'||d.name==='성수 선배')nameCol='#6688ee';
      else if(d.name==='나')nameCol='#88ccff';
      X.fillStyle=nameCol;X.fillText(d.name,62,boxY-2);
    }
    textReveal+=textSpeed;
    const fullText=d.text,showLen=Math.min(Math.floor(textReveal),fullText.length);
    const showText=fullText.substring(0,showLen);
    X.font=`16px ${FONT}`;X.fillStyle='#eee';X.textAlign='left';
    const maxW2=W-100;let lines=[],line='';
    for(let i=0;i<showText.length;i++){line+=showText[i];if(X.measureText(line).width>maxW2){lines.push(line.slice(0,-1));line=showText[i]}}
    lines.push(line);
    for(let i=0;i<lines.length;i++)X.fillText(lines[i],55,boxY+30+i*24);
    if(showLen>=fullText.length){
      const arrowY=boxY+boxH-20+Math.sin(gt*0.1)*3;
      X.fillStyle='#fff';X.beginPath();X.moveTo(W-55,arrowY);X.lineTo(W-48,arrowY+6);X.lineTo(W-62,arrowY+6);X.fill();
    }
  }
  if(choiceOptions && dialogQueue.length>0 && dialogIdx>=dialogQueue.length){
    const boxY=H-50-choiceOptions.length*50;
    for(let i=0;i<choiceOptions.length;i++){
      const cy=boxY+i*50;
      const hover=mouseX>100&&mouseX<W-100&&mouseY>cy&&mouseY<cy+42;
      if(hover)choiceHover=i;
      roundRect(100,cy,W-200,42,8,hover?'rgba(100,150,255,0.7)':'rgba(40,40,60,0.85)');
      X.strokeStyle=hover?'#88bbff':'rgba(255,255,255,0.2)';X.lineWidth=hover?2:1;
      X.beginPath();X.roundRect(100,cy,W-200,42,8);X.stroke();
      X.font=`bold 15px ${FONT}`;X.textAlign='center';X.fillStyle=hover?'#fff':'#ccc';
      X.fillText(choiceOptions[i].text,W/2,cy+26);
    }
  }
}

  X.fillText(`Day ${day}/${maxDay} — ${timeLabel}`,W-20,30);
  X.font=`bold 11px ${FONT}`;X.textAlign='left';
  const chars=['yuna','hajun','seoyeon','chaeyoung','sungsu'];
  const colors=['#aa88ff','#ffaa44','#ff88aa','#44cc88','#6688ee'];
  for(let i=0;i<5;i++){
    const ay=12+i*18;
    roundRect(8,ay,140,16,5,'rgba(0,0,0,0.5)');
    X.fillStyle=colors[i];X.fillText(`${CHARS[chars[i]].nameShort}`,14,ay+13);
    const pct=Math.min(1,affection[chars[i]]/100);
    roundRect(52,ay+3,88,10,4,'#333');
    if(pct>0)roundRect(53,ay+4,86*pct,8,3,colors[i]);
    drawHeart(46,ay+8,4,colors[i]);
  }
  for(let i=affPopups.length-1;i>=0;i--){
    const p=affPopups[i];p.timer--;p.y-=0.8;
    if(p.timer<=0){affPopups.splice(i,1);continue}
    X.globalAlpha=p.timer/80;X.font=`bold 16px ${FONT}`;X.textAlign='center';
    const col={yuna:'#aa88ff',hajun:'#ffaa44',seoyeon:'#ff88aa',chaeyoung:'#44cc88',sungsu:'#6688ee'}[p.char]||'#fff';
    X.fillStyle=col;X.fillText(`${CHARS[p.char].nameShort} +${p.amount}`,160,25-p.y);
    drawHeart(195,21-p.y,6,'#ff4466');
    X.globalAlpha=1;
  }
}

// ============ FIGHTER ============
function mkF(x,dir,isP){
  return{x,y:FLOOR,dir,vx:0,vy:0,hp:80,maxHp:80,
    st:'idle',fr:0,stT:0,atk:null,cd:0,hitstun:0,
    isP,spec:0,specMax:100,flashT:0,counterFlash:0};
}
function resetFight(oppId){
  p1=mkF(250,1,true);p2=mkF(550,-1,false);
  if(oppId==='seoyeon'){p2.maxHp=50;p2.hp=50}
  else if(oppId==='hajun'){p2.maxHp=65;p2.hp=65}
  else if(oppId==='chaeyoung'){p2.maxHp=60;p2.hp=60}
  else if(oppId==='sungsu'){p2.maxHp=80;p2.hp=80}
  else{p2.maxHp=85;p2.hp=85}
  p2._charId=oppId;shake=0;flash=0;floats=[];slowMo=0;slowFactor=1;slowFlash=0;particles=[];
}

// ============ FIGHT CHARACTER (cute battle) ============
function drawFightChar(f, charId){
  const ch=charId?CHARS[charId]:null;
  const d=f.dir,t=f.stT,st=f.st,fr=f.fr;
  if(f.flashT>0&&Math.floor(f.flashT*3)%2)return;

  X.save();X.translate(f.x,f.y);if(d===-1)X.scale(-1,1);

  let bodyY=0,bodyTilt=0,headTilt=0,lArmAngle=-0.3,rArmAngle=0.3;
  let lLegAngle=0,rLegAngle=0,shinaiAngle=0.5,shinaiLen=70;
  let mouthOpen=false,eyeSquint=false,slashTrail=null;
  const walkCycle=Math.sin(fr*0.15);

  if(st==='idle'){bodyY=Math.sin(fr*0.05)*2;shinaiAngle=0.8}
  else if(st==='walk'){bodyY=Math.abs(walkCycle)*3;lLegAngle=walkCycle*0.4;rLegAngle=-walkCycle*0.4;lArmAngle=-walkCycle*0.2-0.2;rArmAngle=walkCycle*0.2+0.2;shinaiAngle=0.7}
  else if(st==='jump'){lLegAngle=0.3;rLegAngle=-0.3;shinaiAngle=0.5;bodyY=-5}
  else if(st==='attack'){
    mouthOpen=true;
    if(f.atk==='head'){
      if(t<13){const p=t/13;shinaiAngle=-0.3-p*1.8;rArmAngle=-0.5-p*1.5;lArmAngle=-0.3-p*0.5;bodyY=-p*6;headTilt=-p*0.1}
      else if(t<19){const s2=Math.sin(t*0.8)*0.03;shinaiAngle=-2.1+s2;rArmAngle=-2+s2;lArmAngle=-0.8;bodyY=-6;headTilt=-0.1}
      else if(t<24){const p=(t-19)/5;shinaiAngle=-2.1+p*3.8;rArmAngle=-2+p*2.8;lArmAngle=-0.8+p*0.6;bodyY=-6+p*10;bodyTilt=p*0.12;headTilt=-0.1+p*0.17;slashTrail={type:'vert',p}}
      else{const p=Math.min(1,(t-24)/12);shinaiAngle=1.7-p*0.9;rArmAngle=0.8-p*0.5;bodyY=4-p*4;bodyTilt=0.12-p*0.12}
    }else if(f.atk==='waist'){
      if(t<9){const p=t/9;shinaiAngle=0.5-p*1.2;rArmAngle=-0.3-p*0.8;lArmAngle=-0.4;bodyTilt=-p*0.15;bodyY=-p*2}
      else if(t<14){const s2=Math.sin(t*0.9)*0.02;shinaiAngle=-0.7+s2;rArmAngle=-1.1+s2;bodyTilt=-0.15;bodyY=-2}
      else if(t<19){const p=(t-14)/5;shinaiAngle=-0.7+p*2.5;rArmAngle=-1.1+p*2.2;bodyTilt=-0.15+p*0.35;bodyY=-2+p*3;slashTrail={type:'horiz',p}}
      else{const p=Math.min(1,(t-19)/9);shinaiAngle=1.8-p*1;rArmAngle=1.1-p*0.8;bodyTilt=0.2-p*0.2;bodyY=1-p*1}
    }else if(f.atk==='wrist'){
      if(t<6){const p=t/6;shinaiAngle=0.7+p*0.3;rArmAngle=0.2+p*0.2;bodyTilt=-p*0.05;bodyY=-p*1}
      else if(t<12){const p=(t-6)/6;shinaiAngle=1.0-p*0.5+p*0.8;rArmAngle=0.4+p*1;bodyTilt=-0.05+p*0.12;bodyY=-1+p*3;slashTrail={type:'thrust',p}}
      else{const p=Math.min(1,(t-12)/8);shinaiAngle=1.3-p*0.5;rArmAngle=1.4-p*1.1;bodyTilt=0.07-p*0.07;bodyY=2-p*2}
    }
  }else if(st==='hit'){
    const p=Math.min(1,t/HIT_STUN);bodyY=3*(1-p);bodyTilt=-0.15*(1-p);headTilt=-0.1*(1-p);rArmAngle=0.8-p*0.5;shinaiAngle=1.5-p*0.7;eyeSquint=true;
  }else if(st==='block'){shinaiAngle=-0.5;rArmAngle=-0.9;lArmAngle=-0.6;bodyY=3;bodyTilt=-0.05}
  else if(st==='special'){
    mouthOpen=true;
    if(t<12){const p=t/12;shinaiAngle=-0.5-p*2;rArmAngle=-1-p*1;lArmAngle=-0.5-p*0.5;bodyY=-p*7;bodyTilt=-p*0.05}
    else if(t<17){shinaiAngle=-2.5;rArmAngle=-2;lArmAngle=-1;bodyY=-7}
    else if(t<23){const p=(t-17)/6;shinaiAngle=-2.5+p*5;rArmAngle=-2+p*3.5;lArmAngle=-1+p*1.2;bodyY=-7+p*12;bodyTilt=p*0.2;slashTrail={type:'special',p}}
    else{const p=Math.min(1,(t-23)/10);shinaiAngle=2.5-p*1.7;rArmAngle=1.5-p*1.2;bodyY=5-p*5;bodyTilt=0.2-p*0.2}
  }else if(st==='ko'){
    const kp=Math.min(t*2,90);X.rotate(kp*Math.PI/180);bodyY=Math.min(t*3,60);eyeSquint=true;shinaiAngle=2;rArmAngle=1.5;
  }

  const cy=-75+bodyY;
  X.save();X.translate(0,cy+42);X.rotate(bodyTilt);X.translate(0,-(cy+42));

  const skinCol=ch?ch.skinCol:'#f4c078';
  const skinLight=ch?ch.skinLight:'#fad8a8';
  const hairCol=ch?ch.hairCol:'#1a1a3a';
  const hairLight=ch?ch.hairLight:'#2a2a5a';
  const bodyCol=ch?ch.bodyCol:'#0f3460';
  const bodyColL=ch?ch.bodyColL:'#1a4a7a';
  const hbCol=ch?ch.headbandCol:'#4488ff';
  const eyeCol=ch?ch.eyeCol:'#4488ff';
  const hairStyle=ch?ch.hairStyle:'spiky';

  // Legs
  const legLen=30;
  limb(-8,cy+40,-8+Math.sin(lLegAngle)*legLen,cy+40+Math.cos(lLegAngle)*legLen,11,bodyCol);
  circle(-8+Math.sin(lLegAngle)*legLen,cy+40+Math.cos(lLegAngle)*legLen+2,7,'#333');
  limb(8,cy+40,8+Math.sin(rLegAngle)*legLen,cy+40+Math.cos(rLegAngle)*legLen,11,bodyCol);
  circle(8+Math.sin(rLegAngle)*legLen,cy+40+Math.cos(rLegAngle)*legLen+2,7,'#333');

  // Body
  const bgrd=X.createLinearGradient(-18,cy,18,cy);bgrd.addColorStop(0,bodyCol);bgrd.addColorStop(0.5,bodyColL);bgrd.addColorStop(1,bodyCol);
  roundRect(-18,cy,36,44,10,bgrd);
  X.fillStyle=skinCol;X.beginPath();X.moveTo(-5,cy+4);X.lineTo(0,cy+18);X.lineTo(5,cy+4);X.fill();
  const beltG=X.createLinearGradient(0,cy+30,0,cy+37);beltG.addColorStop(0,'#222');beltG.addColorStop(0.5,'#444');beltG.addColorStop(1,'#222');
  roundRect(-17,cy+30,34,7,3,beltG);

  // Left arm
  const laLen=28,laSx=-18,laSy=cy+10;
  const laEx=laSx+Math.sin(lArmAngle)*laLen,laEy=laSy+Math.cos(lArmAngle)*laLen;
  limb(laSx,laSy,laEx,laEy,9,bodyCol);circle(laEx,laEy,5,skinCol);circle(laEx,laEy,3,skinLight);

  // Right arm + shinai
  const raLen=28,raSx=18,raSy=cy+10;
  const raEx=raSx+Math.sin(rArmAngle)*raLen,raEy=raSy+Math.cos(rArmAngle)*raLen;
  limb(raSx,raSy,raEx,raEy,9,bodyCol);circle(raEx,raEy,5,skinCol);circle(raEx,raEy,3,skinLight);

  const shEx=raEx+Math.sin(shinaiAngle)*shinaiLen,shEy=raEy-Math.cos(shinaiAngle)*shinaiLen;
  limb(raEx,raEy,raEx+Math.sin(shinaiAngle)*15,raEy-Math.cos(shinaiAngle)*15,5,'#7a5a30');
  const tsX=raEx+Math.sin(shinaiAngle)*16,tsY=raEy-Math.cos(shinaiAngle)*16;
  circle(tsX,tsY,4,'#5a4a30');limb(tsX,tsY,shEx,shEy,3,'#deb887');circle(shEx,shEy,3,'#c4a06a');

  // Slash trail
  if(slashTrail){
    X.save();const p=slashTrail.p;X.globalAlpha=0.6*(1-p*0.5);
    if(slashTrail.type==='vert'){for(let i=0;i<8;i++){const a=p*3-i*0.3;circle(10+Math.cos(a)*25,cy-10+Math.sin(a)*50,4-i*0.3,'#ffffaa')}if(p>0.4)circle(shEx,shEy,12,'rgba(255,255,200,0.5)')}
    else if(slashTrail.type==='horiz'){for(let i=0;i<10;i++)circle(shEx-i*8,shEy+Math.sin(i*0.5)*4,3-i*0.2,'#aaffff');if(p>0.4)circle(shEx,shEy,10,'rgba(200,255,255,0.5)')}
    else if(slashTrail.type==='thrust'){for(let i=0;i<6;i++){X.fillStyle='#ffaaff';X.fillRect(shEx-i*10,shEy+(Math.random()-0.5)*6-1,8+i*2,2)}if(p>0.4)circle(shEx,shEy,8,'rgba(255,200,255,0.6)')}
    else if(slashTrail.type==='special'){X.globalAlpha=0.8;for(let i=0;i<14;i++){const a=p*4-i*0.2;circle(10+Math.cos(a)*(30+i*2),cy-15+Math.sin(a)*(40+i*2),Math.max(1,6-i*0.3),i%2?'#ffd700':'#fff')}if(p>0.3){X.globalAlpha=0.6;circle(shEx,shEy,20,'rgba(255,215,0,0.4)')}}
    X.restore();
  }

  // === HEAD ===
  const headR=25,headX=0,headY2=cy-20;
  X.save();X.translate(headX,headY2);X.rotate(headTilt);

  // Back hair (fight)
  if(hairStyle==='long_straight'){
    X.fillStyle=hairCol;roundRect(-headR-3,0,headR*2+6,40,5,hairCol);
  }else if(hairStyle==='twin_tail'){
    X.fillStyle=hairCol;
    X.beginPath();X.moveTo(-20,0);X.quadraticCurveTo(-30,20,-26,45);X.lineTo(-20,40);X.quadraticCurveTo(-24,20,-16,2);X.fill();
    X.beginPath();X.moveTo(16,2);X.quadraticCurveTo(24,20,20,40);X.lineTo(26,45);X.quadraticCurveTo(30,20,20,0);X.fill();
  }else if(hairStyle==='ponytail'){
    X.fillStyle=hairCol;
    X.beginPath();
    X.moveTo(2,-5);
    X.bezierCurveTo(8,5,12,25,8,50);
    X.lineTo(3,48);
    X.bezierCurveTo(5,25,3,8,-2,-3);
    X.fill();
    X.fillStyle=ch?ch.accentCol:'#22aa66';
    circle(3,-1,3,ch?ch.accentCol:'#22aa66');
  }
  // short_neat: no back hair in fight either

  circle(0,-2,headR+5,hairCol);
  circle(0,0,headR,skinCol);
  const sg=X.createRadialGradient(-4,-4,2,-2,-2,headR);sg.addColorStop(0,skinLight);sg.addColorStop(0.7,skinCol);sg.addColorStop(1,skinCol);
  circle(0,0,headR-1,sg);

  // Ears
  ellipse(-headR+1,3,5,6,skinCol);ellipse(-headR+2,3,3,4,skinLight);
  ellipse(headR-1,3,5,6,skinCol);ellipse(headR-2,3,3,4,skinLight);

  // Front hair (fight)
  if(hairStyle==='long_straight'){
    X.fillStyle=hairCol;
    X.beginPath();X.moveTo(-headR-1,-1);X.quadraticCurveTo(-headR+5,-headR-6,0,-headR-3);X.quadraticCurveTo(headR-5,-headR-6,headR+1,-1);
    X.quadraticCurveTo(headR-3,-headR+5,0,-headR+3);X.quadraticCurveTo(-headR+3,-headR+5,-headR-1,-1);X.fill();
    for(let i=-10;i<12;i+=5){X.beginPath();X.moveTo(i,-headR+4);X.lineTo(i+1,-5);X.lineTo(i+3,-headR+4);X.fill()}
    roundRect(-headR-3,-6,7,30,3,hairCol);roundRect(headR-4,-6,7,30,3,hairCol);
  }else if(hairStyle==='spiky'){
    X.fillStyle=hairCol;
    X.beginPath();X.moveTo(-headR,-1);X.quadraticCurveTo(-headR+5,-headR-5,0,-headR-3);X.quadraticCurveTo(headR-5,-headR-5,headR,-1);
    X.quadraticCurveTo(headR-3,-headR+5,0,-headR+3);X.quadraticCurveTo(-headR+3,-headR+5,-headR,-1);X.fill();
    const spk=[[-14,-7,-11,-16,-7,-5],[-3,-5,-1,-14,3,-4],[7,-6,11,-17,15,-5],[17,-4,20,-13,22,-2],[-7,-6,-5,-13,-2,-5]];
    for(const s of spk){X.beginPath();X.moveTo(s[0],s[1]);X.lineTo(s[2],s[3]);X.lineTo(s[4],s[5]);X.fill()}
  }else if(hairStyle==='twin_tail'){
    X.fillStyle=hairCol;
    X.beginPath();X.moveTo(-headR,-1);X.quadraticCurveTo(-headR+3,-headR-4,0,-headR-2);X.quadraticCurveTo(headR-3,-headR-4,headR,-1);
    X.quadraticCurveTo(headR-2,-headR+5,0,-headR+3);X.quadraticCurveTo(-headR+2,-headR+5,-headR,-1);X.fill();
    for(let i=-11;i<13;i+=5){X.beginPath();X.moveTo(i,-headR+4);X.lineTo(i+1.5,-5);X.lineTo(i+3,-headR+4);X.fill()}
    X.fillStyle=ch?ch.accentCol:'#ff6688';
    X.beginPath();X.moveTo(-18,-8);X.quadraticCurveTo(-26,-15,-20,-18);X.quadraticCurveTo(-16,-13,-18,-8);X.fill();
    X.beginPath();X.moveTo(-18,-8);X.quadraticCurveTo(-25,-3,-20,1);X.quadraticCurveTo(-16,-3,-18,-8);X.fill();
    circle(-18,-8,3,'#fff');
    X.beginPath();X.moveTo(18,-8);X.quadraticCurveTo(26,-15,20,-18);X.quadraticCurveTo(16,-13,18,-8);X.fill();
    X.beginPath();X.moveTo(18,-8);X.quadraticCurveTo(25,-3,20,1);X.quadraticCurveTo(16,-3,18,-8);X.fill();
    circle(18,-8,3,'#fff');
  }else if(hairStyle==='ponytail'){
    X.fillStyle=hairCol;
    X.beginPath();
    X.moveTo(-headR,-1);X.quadraticCurveTo(-headR+5,-headR-5,0,-headR-3);
    X.quadraticCurveTo(headR-5,-headR-5,headR,-1);
    X.quadraticCurveTo(headR-3,-headR+5,0,-headR+3);
    X.quadraticCurveTo(-headR+3,-headR+4,-headR,-1);
    X.fill();
    // Side-swept bangs
    X.beginPath();X.moveTo(-12,-headR+4);X.quadraticCurveTo(-13,-7,-10,-2);
    X.lineTo(-8,-3);X.quadraticCurveTo(-10,-8,-9,-headR+5);X.fill();
    X.beginPath();X.moveTo(-3,-headR+3);X.quadraticCurveTo(-1,-8,1,-3);
    X.lineTo(3,-4);X.quadraticCurveTo(1,-9,0,-headR+4);X.fill();
    // Hair tie
    X.fillStyle=ch?ch.accentCol:'#22aa66';
    circle(4,-headR+1,3,ch?ch.accentCol:'#22aa66');
  }else if(hairStyle==='short_neat'){
    X.fillStyle=hairCol;
    X.beginPath();
    X.moveTo(-headR,-1);X.quadraticCurveTo(-headR+4,-headR-4,-3,-headR-2);
    X.quadraticCurveTo(headR-6,-headR-4,headR,-1);
    X.quadraticCurveTo(headR-3,-headR+5,0,-headR+3);
    X.quadraticCurveTo(-headR+3,-headR+4,-headR,-1);
    X.fill();
    // Short side bangs
    X.beginPath();X.moveTo(-10,-headR+4);X.quadraticCurveTo(-11,-7,-8,-3);
    X.lineTo(-6,-4);X.quadraticCurveTo(-8,-8,-7,-headR+5);X.fill();
    X.beginPath();X.moveTo(-2,-headR+3);X.quadraticCurveTo(0,-8,2,-4);
    X.lineTo(4,-5);X.quadraticCurveTo(2,-9,1,-headR+4);X.fill();
  }

  // Hair shine
  X.fillStyle=hairLight;X.globalAlpha=0.2;
  X.beginPath();X.moveTo(-4,-headR+3);X.quadraticCurveTo(0,-headR-1,4,-headR+3);X.lineTo(2,-headR+5);X.quadraticCurveTo(0,-headR+1,-2,-headR+5);X.fill();
  X.globalAlpha=1;

  // Eyes
  if(eyeSquint||st==='ko'){
    X.strokeStyle='#2a2a4a';X.lineWidth=2.5;X.lineCap='round';
    X.beginPath();X.moveTo(-12,-1);X.lineTo(-7,1);X.lineTo(-12,3);X.stroke();
    X.beginPath();X.moveTo(7,-1);X.lineTo(12,1);X.lineTo(7,3);X.stroke();
  }else{
    drawBigEye(-9,1,eyeCol,0.9,0);
    drawBigEye(9,1,eyeCol,0.9,0);
    if(st==='attack'||st==='special'){
      X.strokeStyle='#2a2a2a';X.lineWidth=2.5;X.lineCap='round';
      X.beginPath();X.moveTo(-14,-8);X.lineTo(-5,-10);X.stroke();
      X.beginPath();X.moveTo(5,-10);X.lineTo(14,-8);X.stroke();
    }else{
      X.strokeStyle=hairCol;X.lineWidth=2;X.lineCap='round';
      X.beginPath();X.moveTo(-14,-9);X.lineTo(-5,-10);X.stroke();
      X.beginPath();X.moveTo(5,-10);X.lineTo(14,-9);X.stroke();
    }
  }

  // Blush
  if(ch&&(ch.personality==='shy'||ch.personality==='tsundere')){X.globalAlpha=0.4;ellipse(-15,7,5,3,'#ff8888');ellipse(15,7,5,3,'#ff8888');X.globalAlpha=1}

  // Nose
  circle(1,6,2,ch&&(ch.personality==='shy'||ch.personality==='tsundere')?'#ecc8a0':'#e8b080');

  // Mouth
  if(mouthOpen){ellipse(1,13,6,5,'#3a1a1a');ellipse(1,12,4,2,'#ff6666')}
  else if(st==='hit'||st==='ko'){X.strokeStyle='#5a3a3a';X.lineWidth=1.5;X.beginPath();X.moveTo(-4,13);X.lineTo(4,15);X.stroke()}
  else{X.strokeStyle='#c08848';X.lineWidth=1.5;X.lineCap='round';X.beginPath();X.arc(1,10,5,0.2,Math.PI-0.2);X.stroke()}

  // Headband
  X.save();X.beginPath();X.arc(0,0,headR+1,-2.5,-0.6);X.strokeStyle=hbCol;X.lineWidth=5;X.stroke();
  X.beginPath();X.arc(0,0,headR+1,-2.1,-0.8);X.strokeStyle='rgba(255,255,255,0.2)';X.lineWidth=2;X.stroke();
  const flutter2=Math.sin(fr*0.08)*3;
  X.fillStyle=hbCol;X.beginPath();X.moveTo(headR-2,-7);X.quadraticCurveTo(headR+8,-13+flutter2,headR+16,-9+flutter2);X.quadraticCurveTo(headR+8,-7+flutter2*0.5,headR+14,-3+flutter2*0.7);X.quadraticCurveTo(headR+5,-1,headR-2,-3);X.fill();
  X.restore();

  X.restore(); // head
  X.restore(); // body tilt

  // Counter flash
  if(f.counterFlash>0){
    const ca=f.counterFlash/20;
    const cg=X.createRadialGradient(0,cy+10,5,0,cy+10,50+ca*20);
    cg.addColorStop(0,`rgba(0,255,200,${ca*0.4})`);cg.addColorStop(0.6,`rgba(0,255,200,${ca*0.15})`);cg.addColorStop(1,'rgba(0,255,200,0)');
    X.fillStyle=cg;X.fillRect(-80,cy-40,160,120);
    for(let i=0;i<6;i++){const a=i*Math.PI/3+f.fr*0.1,r1=30+ca*10,r2=55+ca*15;X.strokeStyle=`rgba(0,255,200,${ca*0.5})`;X.lineWidth=2;X.beginPath();X.moveTo(Math.cos(a)*r1,cy+10+Math.sin(a)*r1);X.lineTo(Math.cos(a)*r2,cy+10+Math.sin(a)*r2);X.stroke()}
  }

  if(f.isP){X.fillStyle='#4488ff';X.beginPath();X.moveTo(-6,8);X.lineTo(0,14);X.lineTo(6,8);X.fill()}
  X.restore();
}

// ============ FIGHT LOGIC ============
const ATK_HEAD=36,ATK_WAIST=28,ATK_WRIST=20,SPEC_FR=35,HIT_STUN=14,BLOCK_STUN=8,COUNTER_STUN=22;
const GRAVITY=0.5,JUMP_POW=11;
let fightGs='READY', fightGt=0;

function getCounterWindow(atkType){
  if(atkType==='head') return [4,20];
  if(atkType==='waist') return [4,14];
  if(atkType==='wrist') return [3,9];
  return [0,0];
}
function getAtkName(atk){return{head:'머리',waist:'허리',wrist:'손목'}[atk]||''}
function isInCounterWindow(attacker){
  if(attacker.st!=='attack') return false;
  const [s,e]=getCounterWindow(attacker.atk);
  return attacker.stT>=s && attacker.stT<=e;
}

function checkSlowMo(){
  if(p2.st==='attack' && p2.stT>=2){
    const [ws,we]=getCounterWindow(p2.atk);
    if(p2.stT>=ws && p2.stT<=we && Math.abs(p1.x-p2.x)<150){
      if(slowMo<=0){
        sndSlowEnter();
        slowFlash=8;
        for(let i=0;i<12;i++){
          addParticle(
            Math.random()*W, Math.random()*H,
            (Math.random()-0.5)*0.5, 0,
            40+Math.random()*30,
            'rgba(0,255,200,0.3)', 2, 'spark'
          );
        }
      }
      slowMo=5;
      slowFactor=0.1;
      return;
    }
  }
  if(slowMo>0){
    slowMo--;
    if(slowMo<=0){
      slowFactor=1;
    }
  }
}

function tryCounter(defender,attacker){
  if(!isInCounterWindow(attacker)) return false;
  attacker.st='hit';attacker.stT=0;attacker.hitstun=COUNTER_STUN;
  attacker.vx=(defender.x<attacker.x?1:-1)*6;attacker.flashT=8;
  defender.counterFlash=25;defender.spec=Math.min(defender.specMax,defender.spec+25);defender.cd=0;
  shake=8;flash=0.5;slowMo=0;slowFactor=1;
  snd(800,0.15,'sine',0.12);snd(1200,0.1,'sine',0.08);
  addFloat('받아치기!',defender.x,defender.y-130,'#00ffcc',28);
  addFloat('빈틈!',attacker.x,attacker.y-110,'#ff4444',22);
  for(let i=0;i<15;i++){
    addParticle(attacker.x+(Math.random()-0.5)*30, attacker.y-60+(Math.random()-0.5)*30,
      (Math.random()-0.5)*4, -Math.random()*3-1, 30+Math.random()*20,
      ['#00ffcc','#ffd700','#fff'][Math.floor(Math.random()*3)], 3+Math.random()*3, 'star');
  }
  return true;
}

function pInput(){
  if(p1.hitstun>0||p1.st==='ko')return;
  const canAct=p1.st!=='attack'&&p1.st!=='special';
  if(canAct&&p1.st!=='hit'){
    if(keys['ArrowLeft']){p1.vx=-6;if(p1.y>=FLOOR)p1.st='walk'}
    else if(keys['ArrowRight']){p1.vx=6;if(p1.y>=FLOOR)p1.st='walk'}
    else{p1.vx=0;if(p1.y>=FLOOR&&p1.st==='walk')p1.st='idle'}
  }
  if((ck('KeyW')||ck('ArrowUp'))&&p1.y>=FLOOR&&canAct){p1.vy=-JUMP_POW;p1.st='jump'}
  if(keys['ShiftLeft']||keys['ShiftRight']){if(canAct&&p1.st!=='hit'){p1.st='block';p1.vx=0}}
  else if(p1.st==='block')p1.st='idle';
  if(canAct&&p2.st==='attack'){
    let cKey=null;
    if(ck('KeyA'))cKey='head';else if(ck('KeyS'))cKey='waist';else if(ck('KeyD'))cKey='wrist';
    if(cKey&&Math.abs(p1.x-p2.x)<140){
      if(tryCounter(p1,p2)) return;
      if(p1.cd<=0){
        const cdMap={head:ATK_HEAD+4,waist:ATK_WAIST+4,wrist:ATK_WRIST+3};
        p1.st='attack';p1.atk=cKey;p1.stT=0;p1.cd=cdMap[cKey];
        snd(cKey==='head'?300:cKey==='waist'?200:250,0.2,'sawtooth',0.1);
        addFloat({head:'머리!',waist:'허리!',wrist:'손목!'}[cKey],p1.x,p1.y-120,'#f1c40f',18);
        return;
      }
    }
  }
  if(canAct&&p1.st!=='block'&&p1.cd<=0){
    if(ck('KeyA')){p1.st='attack';p1.atk='head';p1.stT=0;p1.cd=ATK_HEAD+4;snd(300,0.2,'sawtooth',0.1);addFloat('머리!',p1.x,p1.y-120,'#f1c40f',18)}
    else if(ck('KeyS')){p1.st='attack';p1.atk='waist';p1.stT=0;p1.cd=ATK_WAIST+4;snd(200,0.2,'sawtooth',0.1);addFloat('허리!',p1.x,p1.y-120,'#f1c40f',18)}
    else if(ck('KeyD')){p1.st='attack';p1.atk='wrist';p1.stT=0;p1.cd=ATK_WRIST+3;snd(250,0.2,'sawtooth',0.1);addFloat('손목!',p1.x,p1.y-120,'#f1c40f',18)}
  }
  if(ck('Space')&&p1.spec>=p1.specMax&&canAct){
    p1.st='special';p1.stT=0;p1.spec=0;p1.cd=SPEC_FR+5;
    snd(400,0.3,'sawtooth',0.12);addFloat('필살!',p1.x,p1.y-140,'#ffd700',26);shake=4;
  }
}

function aiUpdate(){
  if(p2.hitstun>0||p2.st==='ko')return;
  const dist=Math.abs(p1.x-p2.x);
  p2.dir=p1.x<p2.x?-1:1;
  const canAct=p2.st!=='attack'&&p2.st!=='special'&&p2.st!=='hit'&&p2.st!=='block';
  const oppId=p2._charId;
  let atkRate=0.04,blockRate=0.05,counterRate=0.015,specRate=0.015,speed=4;
  if(oppId==='yuna'){atkRate=0.055;blockRate=0.1;counterRate=0.04;specRate=0.02;speed=4.5}
  else if(oppId==='seoyeon'){atkRate=0.03;blockRate=0.03;counterRate=0.008;specRate=0.008;speed=3.2}
  else if(oppId==='chaeyoung'){atkRate=0.045;blockRate=0.04;counterRate=0.01;specRate=0.012;speed=5}
  else if(oppId==='sungsu'){atkRate=0.04;blockRate=0.12;counterRate=0.05;specRate=0.02;speed=3.8}
  if(canAct){
    if(dist>75){p2.vx=(p1.x<p2.x?-1:1)*speed;p2.st=p2.y>=FLOOR?'walk':p2.st}
    else if(dist<25){p2.vx=(p1.x<p2.x?1:-1)*1.5;p2.st=p2.y>=FLOOR?'walk':p2.st}
    else{p2.vx=0;if(p2.y>=FLOOR)p2.st='idle'}
  }
  if(p1.st==='attack'&&dist<130&&Math.random()<counterRate&&canAct){if(tryCounter(p2,p1))return}
  if(p1.st==='attack'&&dist<100&&Math.random()<blockRate&&p2.st!=='attack'){p2.st='block';p2.vx=0;return}
  else if(p2.st==='block'&&(p1.st!=='attack'||dist>110)){if(Math.random()<0.12)p2.st='idle'}
  if(dist<100&&p2.cd<=0&&Math.random()<atkRate&&p2.st!=='block'&&canAct){
    const types=['head','waist','wrist'],type=types[Math.floor(Math.random()*3)];
    const cdMap={head:ATK_HEAD+3,waist:ATK_WAIST+3,wrist:ATK_WRIST+2};
    p2.st='attack';p2.atk=type;p2.stT=0;p2.cd=cdMap[type];
    snd(type==='head'?300:type==='waist'?200:250,0.15,'sawtooth',0.08);
    addFloat({head:'머리!',waist:'허리!',wrist:'손목!'}[type],p2.x,p2.y-120,'#e74c3c',16);
  }
  if(p2.spec>=p2.specMax&&dist<100&&Math.random()<specRate&&canAct){
    p2.st='special';p2.stT=0;p2.spec=0;p2.cd=SPEC_FR+5;addFloat('필살!',p2.x,p2.y-140,'#e74c3c',22);shake=4;
  }
}

function checkHit(atk,def,dmg){
  const dist=Math.abs(atk.x-def.x),range=atk.st==='special'?120:95;
  if(dist>range)return;
  if(def.st==='block'){
    def.hitstun=BLOCK_STUN;def.st='hit';def.stT=0;
    snd(150,0.1,'square',0.08);addFloat('방어!',def.x,def.y-110,'#3498db',16);
    atk.spec=Math.min(atk.specMax,atk.spec+5);def.spec=Math.min(def.specMax,def.spec+10);return;
  }
  def.hp-=dmg;def.hitstun=HIT_STUN;def.st='hit';def.stT=0;def.flashT=6;
  def.vx=(atk.x<def.x?1:-1)*5;shake=8;flash=0.4;sndHit();
  atk.spec=Math.min(atk.specMax,atk.spec+15);def.spec=Math.min(def.specMax,def.spec+8);
  addFloat(`${dmg}`,def.x,def.y-100,'#fff',24);
  for(let i=0;i<8;i++){addParticle(def.x+(Math.random()-0.5)*20,def.y-60,(Math.random()-0.5)*3,-Math.random()*2-1,20+Math.random()*15,'#ffaa44',2+Math.random()*2,'circle')}
}

function updateFighter(f){
  f.fr++;if(f.cd>0)f.cd--;if(f.flashT>0)f.flashT-=0.3;if(f.counterFlash>0)f.counterFlash--;
  if(f.hitstun>0){f.hitstun--;if(f.hitstun===0&&f.st==='hit')f.st='idle'}
  if(f.st==='attack'){
    f.stT++;
    const atkLen=f.atk==='head'?ATK_HEAD:f.atk==='waist'?ATK_WAIST:ATK_WRIST;
    const hitF=f.atk==='head'?22:f.atk==='waist'?16:10;
    if(f.stT===hitF)checkHit(f,f===p1?p2:p1,f.isP?18:12);
    if(f.stT>=atkLen){f.st='idle';f.stT=0}
  }
  if(f.st==='special'){
    f.stT++;
    if(f.stT===20){checkHit(f,f===p1?p2:p1,f.isP?40:25);shake=12;flash=0.6}
    if(f.stT>=SPEC_FR){f.st='idle';f.stT=0}
  }
  f.x+=f.vx;f.vy+=GRAVITY;f.y+=f.vy;
  if(f.y>=FLOOR){f.y=FLOOR;f.vy=0;if(f.st==='jump')f.st='idle'}
  f.x=Math.max(30,Math.min(W-30,f.x));
  if(f.st!=='walk'&&f.y>=FLOOR&&f.st!=='attack'&&f.st!=='special')f.vx*=0.8;
}

function addFloat(t,x,y,col,sz){floats.push({t,x,y,col:col||'#fff',sz:sz||20,life:50,max:50})}
function updateFloats(){for(let i=floats.length-1;i>=0;i--){floats[i].y-=0.8;floats[i].life--;if(floats[i].life<=0)floats.splice(i,1)}}
function drawFloats(){for(const f of floats){const a=f.life/f.max;X.globalAlpha=a;X.font=`bold ${f.sz}px ${FONT}`;X.textAlign='center';X.fillStyle='#000';X.fillText(f.t,f.x+2,f.y+2);X.fillStyle=f.col;X.fillText(f.t,f.x,f.y)}X.globalAlpha=1}

// ============ SLOW-MO VISUAL EFFECTS ============
function drawSlowMoFX(){
  if(slowFactor>=1)return;
  const vig=X.createRadialGradient(W/2,H/2,100,W/2,H/2,450);
  vig.addColorStop(0,'rgba(0,40,60,0)');vig.addColorStop(0.7,'rgba(0,30,50,0.1)');vig.addColorStop(1,'rgba(0,20,40,0.35)');
  X.fillStyle=vig;X.fillRect(0,0,W,H);
  X.strokeStyle='rgba(0,255,200,0.06)';X.lineWidth=1;
  for(let i=0;i<8;i++){
    const lx=Math.random()*W,ly=Math.random()*H;
    X.beginPath();X.moveTo(lx,ly);X.lineTo(lx+30+Math.random()*40,ly);X.stroke();
  }
  if(slowFlash>0){
    X.fillStyle=`rgba(0,255,200,${slowFlash*0.03})`;X.fillRect(0,0,W,H);
    slowFlash-=0.5;
  }
}

// ============ MAIN RENDER ============
function render(){
  X.save();
  if(shake>0)X.translate((Math.random()-0.5)*shake*3,(Math.random()-0.5)*shake*3);
  X.fillStyle='#000';X.fillRect(0,0,W,H);
  switch(gs){
    case 'TITLE': rTitle(); break;
    case 'CHARINTRO': rCharIntro(); break;
    case 'VN': rVN(); break;
    case 'FIGHT':
      drawDojoBg();
      drawFightChar(p1,null);
      drawFightChar(p2,p2._charId);
      drawSlowMoFX();
      drawFightHUD();
      drawFloats();
      drawParticles();
      if(fightGs==='READY')rFightReady();
      if(fightGs==='KO')rFightKO();
      break;
  }
  X.restore();
  if(flash>0){X.fillStyle=`rgba(255,255,255,${flash})`;X.fillRect(0,0,W,H)}
}

function rTitle(){
  const bg=X.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#1a0a2e');bg.addColorStop(0.5,'#2a1a4e');bg.addColorStop(1,'#0a0a1e');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  for(let i=0;i<30;i++){const px=(i*97+gt*0.3)%W,py=(i*43+gt*0.5)%(H+50)-25,sz=2+Math.sin(i)*1.5;X.globalAlpha=0.3+Math.sin(gt*0.01+i)*0.2;circle(px,py,sz,'#ffb7c5')}
  X.globalAlpha=1;
  // 5 characters spread evenly
  drawVnChar('yuna',100,'soft',1.3);
  drawVnChar('hajun',250,'happy',1.3);
  drawVnChar('seoyeon',400,'determined',1.3);
  drawVnChar('chaeyoung',550,'neutral',1.3);
  drawVnChar('sungsu',700,'neutral',1.3);
  X.fillStyle='rgba(0,0,0,0.3)';X.fillRect(0,0,W,H);
  X.font=`bold 20px ${FONT}`;X.textAlign='center';X.fillStyle='#ffb7c5';X.fillText('서울대 검도부',W/2,80);
  X.font=`bold 52px ${FONT}`;X.fillStyle='#000';X.fillText('두근두근 검도부',W/2+3,140+3);X.fillStyle='#ffd700';X.fillText('두근두근 검도부',W/2,140);
  X.font=`bold 14px ${FONT}`;X.fillStyle='#aaa';X.fillText('劍道部 戀心錄 — 검으로 맺어진 인연 (확장판)',W/2,170);
  if(Math.floor(gt/30)%2===0){X.font=`bold 18px ${FONT}`;X.fillStyle='#ccc';X.fillText(isMobile?'화면을 터치하세요':'아무 키나 누르세요',W/2,H-60)}
  X.font=`bold 12px ${FONT}`;X.fillStyle='#666';X.fillText(isMobile?'대화: 터치 | 선택지: 터치 | 시합: 화면 버튼':'대화: Enter/클릭 | 선택지: 클릭 | 시합: A/S/D/방향키/Shift/Space',W/2,H-30);
}

function rCharIntro(){
  const bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#0a0a2e');bg.addColorStop(0.5,'#1a1040');bg.addColorStop(1,'#0a0a1e');
  X.fillStyle=bg;X.fillRect(0,0,W,H);

  if(introPhase>=5)return;

  const charId=introOrder[introPhase];
  const ch=CHARS[charId];
  const t=introTimer;

  const fadeIn=Math.min(1, t/40);
  const slideUp=Math.max(0, 30-t*0.8);

  for(let i=0;i<20;i++){
    const px=(i*113+gt*0.2)%W, py=(i*57+gt*0.4)%(H+40)-20;
    X.globalAlpha=0.2+Math.sin(gt*0.015+i)*0.15;
    circle(px,py,2+Math.sin(i)*1,'#ffb7c5');
  }
  X.globalAlpha=1;

  X.globalAlpha=fadeIn*0.15;
  const bgGlow=X.createRadialGradient(300,H/2+slideUp,20,300,H/2+slideUp,200);
  bgGlow.addColorStop(0,ch.accentCol);bgGlow.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=bgGlow;X.fillRect(0,0,W,H);
  X.globalAlpha=1;

  X.globalAlpha=fadeIn;
  X.save();
  X.translate(0,slideUp);
  const exprs=['soft','happy','determined','neutral','neutral'];
  drawVnChar(charId, 280, exprs[introPhase]||'neutral', 2.2);
  X.restore();

  const textX=520;
  const textFade=Math.min(1, Math.max(0, (t-20)/30));
  X.globalAlpha=textFade;

  X.font=`900 42px ${FONT}`;X.textAlign='left';
  X.fillStyle='#000';X.fillText(ch.nameShort, textX+2, 140+2);
  X.fillStyle=ch.accentCol;X.fillText(ch.nameShort, textX, 140);

  X.font=`bold 16px ${FONT}`;
  X.fillStyle='#aaa';X.fillText(ch.role, textX, 170);

  const lineW=Math.min(200, Math.max(0, (t-30)*5));
  X.fillStyle=ch.accentCol;X.fillRect(textX, 185, lineW, 2);

  const descFade=Math.min(1, Math.max(0, (t-40)/30));
  X.globalAlpha=descFade;
  X.font=`400 15px ${FONT}`;X.fillStyle='#ddd';
  const maxDescW=240;
  let desc=ch.desc, dLines=[], dLine='';
  for(let i=0;i<desc.length;i++){
    dLine+=desc[i];
    if(X.measureText(dLine).width>maxDescW){dLines.push(dLine.slice(0,-1));dLine=desc[i]}
  }
  dLines.push(dLine);
  for(let i=0;i<dLines.length;i++){
    X.fillText(dLines[i], textX, 210+i*24);
  }

  const quoteFade=Math.min(1, Math.max(0, (t-60)/25));
  X.globalAlpha=quoteFade;
  X.font=`400 14px ${FONT}`;
  X.fillStyle=ch.accentCol;
  const quotes={
    yuna: '"...자세가 흐트러졌어. 다시."',
    hajun: '"오! 오늘도 같이 연습하자!"',
    seoyeon: '"...착각하지 마요. 그냥 어쩔 수 없이 온 거예요."',
    chaeyoung: '"나 수영부로 옮길 거야. 진짜라니까."',
    sungsu: '"시간이 없어. 효율적으로 움직여야 해."',
  };
  X.fillText(quotes[charId]||'', textX, 290);

  X.globalAlpha=1;

  if(t>50){
    const blink=Math.floor(gt/25)%2===0;
    if(blink){
      X.font=`bold 15px ${FONT}`;X.textAlign='center';
      X.fillStyle='#888';X.fillText('클릭 또는 Enter로 다음',W/2, H-40);
    }
  }

  // Page indicators (5 dots)
  X.textAlign='center';
  for(let i=0;i<5;i++){
    const dx=W/2-40+i*20, dy=H-18;
    if(i===introPhase){
      circle(dx, dy, 5, ch.accentCol);
    }else if(i<introPhase){
      circle(dx, dy, 4, '#666');
    }else{
      X.strokeStyle='#555';X.lineWidth=1.5;
      X.beginPath();X.arc(dx, dy, 4, 0, Math.PI*2);X.stroke();
    }
  }
}

function rVN(){drawVnBg(vnBg);for(const vc of vnChars)drawVnChar(vc.id,vc.x,vc.expr||'neutral');drawDialogBox();drawDayHUD()}

function rFightReady(){
  const ph=Math.floor(fightGt/35);
  X.font=`bold 48px ${FONT}`;X.textAlign='center';
  if(ph===0){X.fillStyle='#000';X.fillText('준비',W/2+3,H/2-20+3);X.fillStyle='#fff';X.fillText('준비',W/2,H/2-20)}
  else if(ph===1){X.fillStyle='#000';X.fillText('시작!',W/2+3,H/2-20+3);X.fillStyle='#e74c3c';X.fillText('시작!',W/2,H/2-20)}
}
function rFightKO(){
  drawFloats();const w=p1.hp>0;
  if(fightGt>20){X.font=`bold 60px ${FONT}`;X.textAlign='center';X.fillStyle='#000';X.fillText('K.O.!',W/2+3,H/2-30+3);X.fillStyle='#e74c3c';X.fillText('K.O.!',W/2,H/2-30)}
  if(fightGt>60){X.font=`bold 32px ${FONT}`;X.fillStyle=w?'#ffd700':'#888';X.fillText(w?'승리!':'패배...',W/2,H/2+20)}
  if(fightGt>100&&Math.floor(fightGt/25)%2===0){X.font=`bold 16px ${FONT}`;X.fillStyle='#ccc';X.fillText(isMobile?'화면을 터치하세요':'아무 키나 누르세요',W/2,H-30)}
}

// ============ MAIN UPDATE ============
function update(){
  gt++;
  switch(gs){
    case 'TITLE':
      if((anyK()||mouseClick||touchTap)&&gt>20){touchTap=false;ia();gs='CHARINTRO';gt=0;introPhase=0;introTimer=0;snd(440,0.15,'sine',0.06)}
      break;
    case 'CHARINTRO':
      introTimer++;
      if((mouseClick||ck('Enter')||ck('Space'))&&introTimer>40){
        introPhase++;introTimer=0;sndSelect();
        if(introPhase>=5){
          gs='VN';gt=0;day=1;timeOfDay='morning';
          affection={yuna:0,hajun:0,seoyeon:0,chaeyoung:0,sungsu:0};flags={};storyPhase=0;
          advanceStory();
        }
      }
      break;
    case 'VN': updateVN(); break;
    case 'FIGHT': updateFight(); break;
  }
  mouseClick=false;
}

function updateVN(){
  if(dialogQueue.length>0&&dialogIdx<dialogQueue.length){
    const d=dialogQueue[dialogIdx],fullLen=d.text.length;
    if(textReveal<fullLen){if(mouseClick||ck('Enter')||ck('Space')){textReveal=fullLen+1;mouseClick=false}}
    else{if(mouseClick||ck('Enter')||ck('Space')){dialogIdx++;textReveal=0;sndSelect();if(dialogIdx>=dialogQueue.length&&!choiceOptions){dialogQueue=[];dialogIdx=0;if(fightOpponent){startFight(fightOpponent);fightOpponent=null;return}advanceStory()}}}
  }else if(choiceOptions){
    if(mouseClick&&choiceHover>=0){const choice=choiceOptions[choiceHover];choiceOptions=null;choiceHover=-1;sndChoice();choice.effect();if(dialogQueue.length===0&&!choiceOptions){if(fightOpponent){startFight(fightOpponent);fightOpponent=null;return}advanceStory()}}
  }
}

function advanceStory(){
  while(storyPhase<STORY.length){
    const beat=STORY[storyPhase];storyPhase++;
    if(beat.afterFight&&gs!=='VN')continue;
    if(beat.afterFight){day=beat.day;timeOfDay=beat.time;beat.scene();return}
    day=beat.day;timeOfDay=beat.time;beat.scene();return;
  }
  gs='TITLE';gt=0;
}

function startFight(oppId){gs='FIGHT';fightGs='READY';fightGt=0;resetFight(oppId)}

function updateFight(){
  fightGt++;
  switch(fightGs){
    case 'READY':if(fightGt>70){fightGs='FIGHT';fightGt=0}break;
    case 'FIGHT':
      checkSlowMo();
      pInput();
      if(slowFactor<1){
        if(fightGt%8===0){
          aiUpdate();updateFighter(p1);updateFighter(p2);
        }
      }else{
        aiUpdate();updateFighter(p1);updateFighter(p2);
      }
      if(p1.st!=='attack'&&p1.st!=='special')p1.dir=p2.x>p1.x?1:-1;
      if(p2.hp<=0&&p2.st!=='ko'){p2.st='ko';p2.stT=0;p2.vx=0}
      if(p1.hp<=0&&p1.st!=='ko'){p1.st='ko';p1.stT=0;p1.vx=0}
      if((p1.st==='ko'||p2.st==='ko')&&fightGt>30){fightGs='KO';fightGt=0;if(p2.st==='ko')sndWin()}
      if(shake>0)shake-=0.4;if(flash>0)flash-=0.02;
      updateFloats();updateParticles();
      break;
    case 'KO':
      if(fightGt<20){updateFighter(p1);updateFighter(p2)}
      if(shake>0)shake-=0.4;if(flash>0)flash-=0.02;
      updateFloats();updateParticles();
      if(fightGt>100&&(anyK()||mouseClick||touchTap)){touchTap=false;gs='VN';gt=0;fightGs='READY';advanceStory()}
      break;
  }
}

// ============ LOOP ============
function loop(){update();render();for(const k in jp)jp[k]=false;mouseClick=false;touchTap=false;requestAnimationFrame(loop)}
function resize(){const r=W/H,mw=innerWidth,mh=innerHeight;let w,h;if(mw/mh>r){h=mh;w=h*r}else{w=mw;h=w/r}c.style.width=w+'px';c.style.height=h+'px'}
addEventListener('resize',resize);resize();
requestAnimationFrame(loop);
</script>
